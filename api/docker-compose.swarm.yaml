version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chw-db}
      POSTGRES_USER: ${POSTGRES_USER:-weltel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weltel -d chw-db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weltel_network

  chw-api:
    image: chw-api:latest
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-weltel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chw-db}
      - PORT=${PORT:-9000}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-5h}
      - SALT_ROUNDS=${SALT_ROUNDS:-5}
      - SMS_TIMEOUT_MS=${SMS_TIMEOUT_MS:-10000}
      - NODE_ENV=production
    ports:
      - target: 9000
        published: 9000
        protocol: tcp
        mode: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
    networks:
      - weltel_network

volumes:
  postgres_data:
    driver: local

networks:
  weltel_network:
    driver: overlay
    driver_opts:
      com.docker.network.driver.overlay.vxlanid: "4096"
