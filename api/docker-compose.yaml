version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: umujyanama-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chw-db}
      POSTGRES_USER: ${POSTGRES_USER:-weltel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weltel -d chw-db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umujyanama-app
    restart: always
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-weltel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chw-db}
      - PORT=${PORT:-9000}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-5h}
      - SALT_ROUNDS=${SALT_ROUNDS:-5}
      - SMS_TIMEOUT_MS=${SMS_TIMEOUT_MS:-10000}
      - UPLOAD_PATH=/app/uploads
      - NODE_ENV=production
    volumes:
      - uploads:/app/uploads
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    command: /app/start.sh

volumes:
  postgres_data:
  uploads: